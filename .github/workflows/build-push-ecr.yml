name: Build + push to ECR

on:
  # NOTE: weekly cron intentionally disabled — releases are triggered
  # manually (workflow_dispatch) or on push to images/**. To re-enable the
  # Monday 06:00 UTC reproducible release, restore:
  #   schedule:
  #     - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "images/**"
      - "tests/**"
      - ".github/workflows/build-push-ecr.yml"
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the image tag (e.g. 'rc1')"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 089332276762.dkr.ecr.us-east-1.amazonaws.com
  # Upstream repos to wrap. The moving `:latest` tag is resolved to a
  # concrete @sha256 digest at build time (see "Resolve upstream digest").
  OPENCLAW_REPO: ghcr.io/openclaw/openclaw
  HERMES_REPO: nousresearch/hermes-agent
  OPENCLAW_TAG: latest
  HERMES_TAG: latest
  # @perkos/perkos-a2a@0.12.0 ships the A2A_HERMES_AUTO_REPLY flag the
  # Assistant relies on. Kept in lockstep with the bridge Dockerfile default
  # and deploy/perkos-assistant/docker-compose.yml — bump all three together.
  PERKOS_A2A_VERSION: 0.12.0
  # Where to register the freshly-pushed image (BETA channel) + later post
  # behavior-test results. PERKOS_API_URL is a repo variable; the shared
  # secret is RUNTIME_INGEST_KEY.
  PERKOS_API_URL: ${{ vars.PERKOS_API_URL }}

jobs:
  build-openclaw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "version=${OPENCLAW_TAG}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # Pin the upstream by digest so this build is reproducible, and read
      # the OCI version label so the platform can show "what's running".
      - name: Resolve upstream digest
        id: upstream
        run: |
          REPO="${OPENCLAW_REPO}"
          DIGEST="$(docker buildx imagetools inspect "${REPO}:${OPENCLAW_TAG}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [ -z "$DIGEST" ]; then echo "could not resolve digest"; exit 1; fi
          VERSION="$(docker buildx imagetools inspect "${REPO}@${DIGEST}" \
            --format '{{ index .Image.Config.Labels "org.opencontainers.image.version" }}' \
            2>/dev/null || true)"
          echo "ref=${REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${REPO}:${OPENCLAW_TAG} -> ${DIGEST} (version='${VERSION}')"

      - name: Build openclaw (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: images/openclaw
          load: true
          platforms: linux/amd64
          build-args: |
            OPENCLAW_REF=${{ steps.upstream.outputs.ref }}
            OPENCLAW_TAG=${{ env.OPENCLAW_TAG }}
            OPENCLAW_VERSION=${{ steps.upstream.outputs.version }}
          tags: perkos-openclaw:test

      - name: Smoke test openclaw
        run: ./tests/openclaw/smoke.sh perkos-openclaw:test

      - name: Build + push openclaw
        uses: docker/build-push-action@v6
        with:
          context: images/openclaw
          push: true
          platforms: linux/amd64
          build-args: |
            OPENCLAW_REF=${{ steps.upstream.outputs.ref }}
            OPENCLAW_TAG=${{ env.OPENCLAW_TAG }}
            OPENCLAW_VERSION=${{ steps.upstream.outputs.version }}
          tags: |
            ${{ env.ECR_REGISTRY }}/perkos-openclaw:${{ steps.tags.outputs.version }}
            ${{ env.ECR_REGISTRY }}/perkos-openclaw:latest

      - name: Register image (beta channel)
        env:
          RUNTIME_INGEST_KEY: ${{ secrets.RUNTIME_INGEST_KEY }}
        run: |
          ./scripts/ingest-runtime-image.sh \
            --runtime openclaw \
            --primary-tag "${{ steps.tags.outputs.version }}" \
            --upstream-source "${OPENCLAW_REPO}" \
            --upstream-version "${{ steps.upstream.outputs.version }}" \
            --upstream-digest "${{ steps.upstream.outputs.digest }}" \
            --a2a-version "${PERKOS_A2A_VERSION}" \
            --build-status ok

  build-hermes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "version=${HERMES_TAG}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Resolve upstream digest
        id: upstream
        run: |
          REPO="${HERMES_REPO}"
          DIGEST="$(docker buildx imagetools inspect "${REPO}:${HERMES_TAG}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [ -z "$DIGEST" ]; then echo "could not resolve digest"; exit 1; fi
          VERSION="$(docker buildx imagetools inspect "${REPO}@${DIGEST}" \
            --format '{{ index .Image.Config.Labels "org.opencontainers.image.version" }}' \
            2>/dev/null || true)"
          echo "ref=${REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${REPO}:${HERMES_TAG} -> ${DIGEST} (version='${VERSION}')"

      - name: Build hermes (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: images/hermes
          load: true
          platforms: linux/amd64
          build-args: |
            HERMES_REF=${{ steps.upstream.outputs.ref }}
            HERMES_TAG=${{ env.HERMES_TAG }}
            HERMES_VERSION=${{ steps.upstream.outputs.version }}
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: perkos-hermes:test

      - name: Smoke test hermes
        run: ./tests/hermes/smoke.sh perkos-hermes:test

      - name: Build + push hermes
        uses: docker/build-push-action@v6
        with:
          context: images/hermes
          push: true
          platforms: linux/amd64
          build-args: |
            HERMES_REF=${{ steps.upstream.outputs.ref }}
            HERMES_TAG=${{ env.HERMES_TAG }}
            HERMES_VERSION=${{ steps.upstream.outputs.version }}
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: |
            ${{ env.ECR_REGISTRY }}/perkos-hermes:${{ steps.tags.outputs.version }}
            ${{ env.ECR_REGISTRY }}/perkos-hermes:latest

      - name: Register image (beta channel)
        env:
          RUNTIME_INGEST_KEY: ${{ secrets.RUNTIME_INGEST_KEY }}
        run: |
          ./scripts/ingest-runtime-image.sh \
            --runtime hermes \
            --primary-tag "${{ steps.tags.outputs.version }}" \
            --upstream-source "${HERMES_REPO}" \
            --upstream-version "${{ steps.upstream.outputs.version }}" \
            --upstream-digest "${{ steps.upstream.outputs.digest }}" \
            --a2a-version "${PERKOS_A2A_VERSION}" \
            --build-status ok

  build-perkos-a2a-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "version=v${PERKOS_A2A_VERSION}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build perkos-a2a-bridge (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: images/perkos-a2a-bridge
          load: true
          platforms: linux/amd64
          build-args: |
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: perkos-a2a-bridge:test

      - name: Smoke test perkos-a2a-bridge
        run: ./tests/perkos-a2a-bridge/smoke.sh perkos-a2a-bridge:test

      - name: Build + push perkos-a2a-bridge
        uses: docker/build-push-action@v6
        with:
          context: images/perkos-a2a-bridge
          push: true
          platforms: linux/amd64
          build-args: |
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: |
            ${{ env.ECR_REGISTRY }}/perkos-a2a-bridge:${{ steps.tags.outputs.version }}
            ${{ env.ECR_REGISTRY }}/perkos-a2a-bridge:latest

  # Behavior test: provision an ephemeral agent from each freshly-pushed
  # image, send canonical prompts (incl. a PM/plan-and-delegate prompt that
  # reproduces the Hermes "(empty)" failure mode), assert substantive
  # replies, then tear the agent down. The result is posted back to the API;
  # a "fail" keeps the image un-promotable to the public channel.
  behavior-test:
    needs: [build-openclaw, build-hermes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "openclaw=${OPENCLAW_TAG}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "hermes=${HERMES_TAG}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Behavior test (openclaw + hermes)
        env:
          RUNTIME_INGEST_KEY: ${{ secrets.RUNTIME_INGEST_KEY }}
          FIREBASE_WEB_API_KEY: ${{ vars.FIREBASE_WEB_API_KEY }}
        run: |
          rc=0
          ./tests/behavior/run.sh openclaw "${{ steps.tags.outputs.openclaw }}" || rc=1
          ./tests/behavior/run.sh hermes   "${{ steps.tags.outputs.hermes }}"   || rc=1
          exit $rc
