name: Build + push to ECR

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "tests/**"
      - ".github/workflows/build-push-ecr.yml"
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the image tag (e.g. 'rc1')"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 089332276762.dkr.ecr.us-east-1.amazonaws.com
  # Upstream tags to wrap. Bumping these picks up upstream releases.
  OPENCLAW_TAG: latest
  HERMES_TAG: latest
  # @perkos/perkos-a2a@0.10.0 added the local tools-token listener
  # (PerkOS-A2A#25) which the per-agent ECS bridge sidecar
  # (PerkOS#80) wires into the runtime plugin. 0.9.x bridges still
  # work but won't enable the Platform-Tools-API path for runtimes.
  PERKOS_A2A_VERSION: 0.11.0

jobs:
  build-openclaw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "version=${OPENCLAW_TAG}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # Build with `load: true` first so the smoke test can `docker
      # run` the image before we push it to ECR. The push step below
      # reuses the buildx layer cache, so the second build is fast.
      - name: Build openclaw (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: images/openclaw
          load: true
          platforms: linux/amd64
          build-args: |
            OPENCLAW_TAG=${{ env.OPENCLAW_TAG }}
          tags: perkos-openclaw:test

      - name: Smoke test openclaw
        run: ./tests/openclaw/smoke.sh perkos-openclaw:test

      - name: Build + push openclaw
        uses: docker/build-push-action@v6
        with:
          context: images/openclaw
          push: true
          platforms: linux/amd64
          build-args: |
            OPENCLAW_TAG=${{ env.OPENCLAW_TAG }}
          tags: |
            ${{ env.ECR_REGISTRY }}/perkos-openclaw:${{ steps.tags.outputs.version }}
            ${{ env.ECR_REGISTRY }}/perkos-openclaw:latest

  build-hermes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "version=${HERMES_TAG}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # Build with `load: true` first so the smoke test can `docker run`
      # against the image before we push it to ECR. The push step below
      # reuses the buildx layer cache, so the second build is ~5s.
      - name: Build hermes (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: images/hermes
          load: true
          platforms: linux/amd64
          build-args: |
            HERMES_TAG=${{ env.HERMES_TAG }}
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: perkos-hermes:test

      - name: Smoke test hermes
        run: ./tests/hermes/smoke.sh perkos-hermes:test

      - name: Build + push hermes
        uses: docker/build-push-action@v6
        with:
          context: images/hermes
          push: true
          platforms: linux/amd64
          build-args: |
            HERMES_TAG=${{ env.HERMES_TAG }}
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: |
            ${{ env.ECR_REGISTRY }}/perkos-hermes:${{ steps.tags.outputs.version }}
            ${{ env.ECR_REGISTRY }}/perkos-hermes:latest

  build-perkos-a2a-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          [ -n "$SUFFIX" ] && SUFFIX="-${SUFFIX}"
          echo "version=v${PERKOS_A2A_VERSION}-perkos.${DATE}.${SHA}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build perkos-a2a-bridge (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: images/perkos-a2a-bridge
          load: true
          platforms: linux/amd64
          build-args: |
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: perkos-a2a-bridge:test

      - name: Smoke test perkos-a2a-bridge
        run: ./tests/perkos-a2a-bridge/smoke.sh perkos-a2a-bridge:test

      - name: Build + push perkos-a2a-bridge
        uses: docker/build-push-action@v6
        with:
          context: images/perkos-a2a-bridge
          push: true
          platforms: linux/amd64
          build-args: |
            PERKOS_A2A_VERSION=${{ env.PERKOS_A2A_VERSION }}
          tags: |
            ${{ env.ECR_REGISTRY }}/perkos-a2a-bridge:${{ steps.tags.outputs.version }}
            ${{ env.ECR_REGISTRY }}/perkos-a2a-bridge:latest
