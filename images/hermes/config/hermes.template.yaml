# PerkOS baseline config for Hermes upstream.
#
# Templated by perkos-entrypoint.sh on container start using envsubst.
# Renders to $HERMES_HOME/config.yaml (default /opt/data/config.yaml).
#
# Format matches the upstream cli-config.yaml.example schema. Override
# any field by setting env vars on the container; the entrypoint
# re-renders this file on every boot, so the env is the source of truth.

model:
  # Default model. "kimi-k2.6:cloud" is what the PerkOS LLM gateway hosts.
  default: ${PERKOS_LLM_DEFAULT_MODEL}

  # "custom" tells Hermes the endpoint is OpenAI-compatible but not one
  # of the named providers it has built-in detection for (OpenRouter,
  # Anthropic, etc.). Required since api.llm.perkos.xyz is our own
  # gateway.
  provider: custom

  # Where the gateway lives. The Assistant runs on the same VPS as the
  # gateway, so this resolves to a loopback HTTPS hop via Caddy.
  base_url: ${PERKOS_LLM_BASE_URL}

  # Tell Hermes to read the API key from this env var name. The actual
  # key value lives in PERKOS_LLM_API_KEY (set on the container env);
  # we don't bake it into this file so the rendered config can be
  # logged/inspected without leaking secrets.
  api_key_env: PERKOS_LLM_API_KEY

  # Wire protocol. MUST be explicit for BYOK: Hermes' runtime_provider.py
  # auto-detects api_mode from the base_url host, and ANY api.openai.com
  # URL is forced to "codex_responses" (the OpenAI Responses API, which
  # expects a Codex/OAuth auth profile, not a plain api_key bearer → 401
  # "missing bearer"). An explicit api_mode on a provider:custom block is
  # honored (runtime_provider._provider_supports_explicit_api_mode) and
  # SKIPS that auto-detect, so the api_key reaches Authorization: Bearer
  # on POST /v1/chat/completions. "chat_completions" is also what the
  # PerkOS gateway (api.llm.perkos.xyz, kimi) resolves to, so it is
  # correct for both. (A future GPT-5.x-reasoning BYOK model would want
  # "codex_responses" + a Codex auth profile — out of scope here.)
  api_mode: chat_completions

agent:
  id: ${PERKOS_AGENT_ID}
  name: ${PERKOS_AGENT_NAME}

# Messaging gateway platforms. Each entry is read by Hermes only when
# its plugin is present in $HERMES_HOME/plugins/platforms/. The
# entrypoint stages a plugin's directory iff the agent's required env
# vars are set, so an unconfigured gateway is silently absent here
# rather than failing at startup.
#
# Telegram uses the Hermes-bundled adapter (no PerkOS plugin code
# needed) — we just turn it on. Farcaster is our own plugin from
# plugins/platforms/farcaster/.
platforms:
  # api_server hosts the OpenAI-compatible HTTP API (/v1/responses,
  # /v1/chat/completions, …) on port 8642. Always on — the
  # perkos-a2a bridge sidecar reaches the runtime through this
  # endpoint (deliverToHermes posts to /v1/responses). Without it
  # the bridge can authenticate to chat.perkos.xyz but every inbound
  # message fails with "hermes delivery failed: fetch failed".
  #
  # Bind to 0.0.0.0 (not the upstream default 127.0.0.1) so the
  # bridge container on the same compose network can reach the
  # runtime by service-name DNS. The HTTP surface is still scoped
  # to that network — no port is published on the host unless the
  # compose deliberately does so.
  # Plain envsubst doesn't support `${VAR:-default}` fallback syntax,
  # so defaults are applied in perkos-entrypoint.sh's normalization
  # step before envsubst runs. Booleans render as the strict strings
  # "true"/"false" which Hermes parses as YAML booleans.
  api_server:
    enabled: ${API_SERVER_ENABLED}
    host: ${API_SERVER_HOST}
    port: ${API_SERVER_PORT}
    key_env: API_SERVER_KEY
  telegram:
    enabled: ${TELEGRAM_ENABLED}
    token_env: TELEGRAM_BOT_TOKEN
    webhook_url: ${TELEGRAM_WEBHOOK_URL}
  slack:
    # Hermes-bundled Slack adapter. We don't ship a custom platform
    # plugin for Slack (unlike Farcaster) because the upstream
    # adapter already exists at gateway/platforms/slack.py — env
    # vars are the only contract we need to wire.
    enabled: ${SLACK_ENABLED}
    bot_token_env: SLACK_BOT_TOKEN
    signing_secret_env: SLACK_SIGNING_SECRET
    channel_id: ${SLACK_CHANNEL_ID}
  farcaster:
    enabled: ${FARCASTER_ENABLED}
    api_key_env: FARCASTER_NEYNAR_API_KEY
    signer_uuid_env: FARCASTER_SIGNER_UUID
    fid_env: FARCASTER_FID
