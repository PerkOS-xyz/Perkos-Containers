name: perkos-tech
version: 0.2.13
description: PerkOS Knowledge, x402, ERC-8004 identity, organization-aware context, and request-loop tools.
provides_tools:
  - perkos_knowledge_query
  - perkos_skill_manifest
  - perkos_x402_policy
  - perkos_knowledge_requests_list
  - perkos_knowledge_request_create
  - perkos_knowledge_request_claim
  - perkos_knowledge_request_fulfill
  - perkos_knowledge_request_validate
  - perkos_knowledge_submit_research
requires_env:
  - name: KNOWLEDGE_BASE_URL
    description: PerkOS Knowledge base URL. Defaults to https://knowledge.perkos.xyz if unset.
    secret: false
  - name: KNOWLEDGE_ORG_ID
    description: Optional PerkOS Knowledge organization scope, for example org_perkos.
    secret: false
  - name: KNOWLEDGE_INGEST_TOKEN
    description: Required only for provider request claim/fulfill/validate and research submit actions.
    secret: true
  - name: PERKOS_LLM_API_KEY
    description: Optional PerkOS LLM key when the same Hermes agent uses api.llm.perkos.xyz.
    secret: true
