# PerkOS Assistant — production compose for the LLM VPS (46.225.62.30).
#
# Single Hermes container, locally-built from ../../images/hermes/. We
# build on the VPS instead of pulling from ECR because:
#   - the LLM VPS doesn't have AWS CLI or ECR auth configured
#   - building takes ~2 min on a Hetzner CX line and only happens on
#     image bumps, so the cost is negligible
#   - one less moving piece (no ECR credential rotation to track)
#
# The .env file (one directory up: /opt/perkos-assistant/.env) holds
# the runtime secrets — relayApiKey from /api/agents/launch?kind=platform,
# the PerkOS LLM admin token, etc. See .env.example for the schema.

services:
  perkos-assistant:
    build:
      context: ../../images/hermes
      dockerfile: Dockerfile
      args:
        HERMES_TAG: latest
        PERKOS_A2A_VERSION: "0.9.0"
    image: perkos-assistant-hermes:local
    container_name: perkos-assistant
    restart: unless-stopped
    # Long-running foreground gateway — the mode upstream documents for
    # Docker. Hermes' bare `hermes` invocation drops into an interactive
    # REPL that exits when stdin is not a TTY, so we explicitly pick the
    # daemon subcommand here.
    command: ["gateway", "run"]
    # No port published — the Assistant talks OUTBOUND only (to
    # chat.perkos.xyz + transport.perkos.xyz + api.llm.perkos.xyz).
    # The /health check is internal; ops can `docker exec` if needed.
    environment:
      # Identity — minted at provision time by /api/agents/launch?kind=platform.
      # Keep these stable across rebuilds; if any change, the Assistant
      # loses its chat history (history lives in /var/perkos/hermes/, see
      # the volume below).
      PERKOS_AGENT_ID: ${PERKOS_AGENT_ID}
      PERKOS_AGENT_NAME: PerkOS-Assistant

      # LLM gateway. The Assistant runs on the same VPS as the gateway,
      # so it can reach it on localhost — but use the public URL so the
      # config stays portable.
      PERKOS_LLM_BASE_URL: ${PERKOS_LLM_BASE_URL:-https://api.llm.perkos.xyz/v1}
      PERKOS_LLM_DEFAULT_MODEL: ${PERKOS_LLM_DEFAULT_MODEL:-kimi-k2.6:cloud}
      PERKOS_LLM_API_KEY: ${PERKOS_LLM_API_KEY}

      # Profile name. Hermes loads ~/.hermes/profiles/${HERMES_PROFILE_NAME}/
      # — keep "default" unless you want the Assistant to have multiple
      # parallel personas on the same container.
      HERMES_PROFILE_NAME: default

      # PerkOS-A2A bridge config. The bridge module reads these to open
      # WebSocket to chat.perkos.xyz + transport.perkos.xyz as the
      # PerkOS-Assistant agent identity.
      PERKOS_RELAY_API_KEY: ${PERKOS_RELAY_API_KEY}
      PERKOS_CHAT_URL: ${PERKOS_CHAT_URL:-wss://chat.perkos.xyz/chat}
      PERKOS_TRANSPORT_URL: ${PERKOS_TRANSPORT_URL:-wss://transport.perkos.xyz/a2a}

      # Future (v2 — when user-scoped tools land): Firebase Admin SDK
      # credentials so the skill can derive walletAddress from convId
      # via Firestore. Left commented for the foundation deploy.
      # FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      # FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      # FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}

    volumes:
      # Hermes state lives here so it survives container rebuilds.
      # ~/.hermes inside the container is /root/.hermes; bind-mount onto
      # /var/perkos-assistant/hermes/ on the host so rsync/backups are
      # straightforward.
      - /var/perkos-assistant/hermes:/root/.hermes

    # Process-level healthcheck — gateway mode doesn't expose an HTTP port
    # by itself. The bridge sidecar reaches into Hermes via its own HTTP
    # API once configured; we still keep this signal honest with `pgrep`.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes/.venv/bin/hermes' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # PerkOS-A2A bridge sidecar — the wire-level connection from the
  # Assistant to chat.perkos.xyz (user ↔ agent messages) and
  # transport.perkos.xyz (agent ↔ agent tasks). Runs perkos-a2a-agent
  # (npm @perkos/perkos-a2a) as a separate Node process. Talks to the
  # Hermes runtime on the compose network over its DNS name.
  perkos-a2a-bridge:
    build:
      context: ../../images/perkos-a2a-bridge
      dockerfile: Dockerfile
      args:
        PERKOS_A2A_VERSION: "0.9.2"
    image: perkos-assistant-bridge:local
    container_name: perkos-assistant-bridge
    restart: unless-stopped
    depends_on:
      perkos-assistant:
        condition: service_healthy
    environment:
      # Identity — same agent name + relayApiKey as the Hermes container.
      # chat.perkos.xyz authenticates the bridge using this key against
      # Firestore /agents/{name}.
      A2A_AGENT_NAME: PerkOS-Assistant
      A2A_RELAY_API_KEY: ${PERKOS_RELAY_API_KEY}

      # Where to reach Hermes on the compose network. perkos-assistant
      # listens on 8642 by default (upstream Hermes default port).
      HERMES_API_URL: http://perkos-assistant:8642
      HERMES_WORKSPACE_URL: http://perkos-assistant:8642

      # Runtime kind — tells the bridge which native API shape to use
      # when delivering inbound frames into the runtime container.
      A2A_RUNTIME: hermes-api

      # Relay (transport.perkos.xyz) — enabled so the Assistant can
      # receive A2A tasks from other agents. Defaults from the Dockerfile
      # are fine; override only if pointing at a staging relay.
      A2A_RELAY_ENABLED: "true"
      A2A_RELAY_URL: ${PERKOS_TRANSPORT_URL:-wss://transport.perkos.xyz/a2a}

      # Chat (chat.perkos.xyz) — enabled so the Assistant receives
      # `chat_deliver` frames when users send messages through the
      # miniapp's ChatbotPanel. The bridge handles WS auth using the
      # same relayApiKey.
      A2A_CHAT_ENABLED: "true"
      A2A_CHAT_URL: ${PERKOS_CHAT_URL:-wss://chat.perkos.xyz/chat}
      A2A_CHAT_API_KEY: ${PERKOS_RELAY_API_KEY}

    # Process-level healthcheck — in NAT mode the bridge skips its A2A
    # HTTP server entirely and uses the relay for all transport (logs
    # "Behind NAT, using relay for bidirectional communication"). Only
    # the local /chat/reply listener on :5060 stays bound, but that's an
    # implementation detail not a contract. Process aliveness is the
    # most honest signal we can give the orchestrator until the bridge
    # publishes a real /health endpoint.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f perkos-a2a-bridge >/dev/null || pgrep -f bridge-agent >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
